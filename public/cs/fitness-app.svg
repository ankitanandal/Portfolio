<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Cross-platform QA: Web (monitor) · Android (phone) · iOS (phone) -->
  <!-- Accent: #c9a96e -->

  <!-- ── WEB / DESKTOP MONITOR ── -->
  <!-- Screen -->
  <rect x="22" y="50" width="224" height="154" rx="10" fill="#c9a96e14" stroke="#c9a96e" stroke-width="1.4"/>
  <!-- Stand neck -->
  <rect x="118" y="204" width="12" height="30" fill="#c9a96e18" stroke="#c9a96e" stroke-width="1"/>
  <!-- Base -->
  <rect x="84" y="232" width="80" height="12" rx="5" fill="#c9a96e18" stroke="#c9a96e" stroke-width="1"/>
  <!-- Screen content: nav bar -->
  <rect x="22" y="50" width="224" height="22" rx="10" fill="#c9a96e22" stroke="#c9a96e" stroke-width="0"/>
  <circle cx="38" cy="61" r="5" fill="#c9a96e" opacity=".35"/>
  <text x="70" y="65" fill="#c9a96e" font-size="8" font-family="monospace" opacity=".6">fittrack.app</text>
  <!-- Content: class cards -->
  <rect x="32" y="82" width="96" height="54" rx="7" fill="#c9a96e18" stroke="#c9a96e" stroke-width=".9"/>
  <text x="80" y="104" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="system-ui,sans-serif" font-weight="700">Yoga</text>
  <text x="80" y="118" text-anchor="middle" fill="#c9a96e" font-size="7.5" font-family="monospace" opacity=".6">Mon 07:00</text>
  <text x="80" y="130" text-anchor="middle" fill="#c9a96e" font-size="7.5" font-family="monospace" opacity=".5">12 spots left</text>
  <rect x="138" y="82" width="96" height="54" rx="7" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.1"/>
  <text x="186" y="104" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="system-ui,sans-serif" font-weight="700">HIIT</text>
  <text x="186" y="118" text-anchor="middle" fill="#c9a96e" font-size="7.5" font-family="monospace" opacity=".6">Mon 09:30</text>
  <text x="186" y="130" text-anchor="middle" fill="#c9a96e" font-size="7.5" font-family="monospace" opacity=".5">8 spots left</text>
  <!-- Book button -->
  <rect x="32" y="148" width="192" height="24" rx="7" fill="#c9a96e28" stroke="#c9a96e" stroke-width="1"/>
  <text x="128" y="164" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="system-ui,sans-serif" font-weight="700">Book Class</text>
  <!-- Label -->
  <text x="128" y="266" text-anchor="middle" fill="#c9a96e" font-size="10.5" font-family="system-ui,sans-serif" font-weight="700" opacity=".8">Web</text>

  <!-- ── CONNECTOR ── -->
  <line x1="248" y1="155" x2="286" y2="155" stroke="#c9a96e" stroke-width="1.1" stroke-dasharray="4 3" opacity=".5"/>

  <!-- ── ANDROID PHONE (center, taller = primary) ── -->
  <rect x="286" y="28" width="228" height="360" rx="22" fill="#c9a96e20" stroke="#c9a96e" stroke-width="2"/>
  <!-- Notch -->
  <rect x="368" y="34" width="64" height="16" rx="8" fill="#c9a96e30" stroke="#c9a96e" stroke-width=".8"/>
  <!-- Home indicator -->
  <rect x="370" y="376" width="60" height="6" rx="3" fill="#c9a96e" opacity=".35"/>
  <!-- Screen content -->
  <rect x="300" y="58" width="200" height="310" rx="12" fill="#c9a96e10" stroke="#c9a96e" stroke-width=".5"/>
  <!-- App header -->
  <rect x="300" y="58" width="200" height="28" rx="12" fill="#c9a96e22" stroke="#c9a96e" stroke-width="0"/>
  <text x="400" y="76" text-anchor="middle" fill="#c9a96e" font-size="9.5" font-family="system-ui,sans-serif" font-weight="800">FitTrack Pro</text>
  <!-- Profile + streak -->
  <circle cx="322" cy="114" r="18" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1"/>
  <text x="322" y="118" text-anchor="middle" fill="#c9a96e" font-size="8" font-family="system-ui,sans-serif" font-weight="700">A</text>
  <text x="370" y="108" fill="#c9a96e" font-size="9" font-family="system-ui,sans-serif" font-weight="700" opacity=".9">Hey, Ankita!</text>
  <text x="370" y="122" fill="#c9a96e" font-size="8" font-family="monospace" opacity=".6">&#128293; 14-day streak</text>
  <!-- Booking card -->
  <rect x="308" y="140" width="184" height="74" rx="10" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.1"/>
  <text x="400" y="160" text-anchor="middle" fill="#c9a96e" font-size="10" font-family="system-ui,sans-serif" font-weight="700">Next Class</text>
  <text x="400" y="176" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="monospace" opacity=".8">Yoga · Mon 07:00</text>
  <rect x="332" y="186" width="136" height="20" rx="6" fill="#c9a96e30" stroke="#c9a96e" stroke-width="1"/>
  <text x="400" y="200" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="system-ui,sans-serif" font-weight="700">Manage Booking</text>
  <!-- Payment row -->
  <rect x="308" y="226" width="184" height="50" rx="10" fill="#c9a96e14" stroke="#c9a96e" stroke-width=".9"/>
  <text x="400" y="246" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="system-ui,sans-serif" font-weight="700">Subscription</text>
  <text x="400" y="261" text-anchor="middle" fill="#c9a96e" font-size="8" font-family="monospace" opacity=".7">Pro · $29/mo · Active &#10003;</text>
  <!-- Bottom nav -->
  <rect x="300" y="310" width="200" height="2" fill="#c9a96e" opacity=".15"/>
  <text x="338" y="334" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="monospace" opacity=".6">Home</text>
  <text x="400" y="334" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="monospace" font-weight="700">Book</text>
  <text x="462" y="334" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="monospace" opacity=".6">Profile</text>
  <!-- Label -->
  <text x="400" y="408" text-anchor="middle" fill="#c9a96e" font-size="10.5" font-family="system-ui,sans-serif" font-weight="700" opacity=".8">Android</text>

  <!-- ── CONNECTOR ── -->
  <line x1="516" y1="155" x2="554" y2="155" stroke="#c9a96e" stroke-width="1.1" stroke-dasharray="4 3" opacity=".5"/>

  <!-- ── iOS PHONE (right) ── -->
  <rect x="554" y="56" width="218" height="312" rx="22" fill="#c9a96e14" stroke="#c9a96e" stroke-width="1.4"/>
  <!-- Dynamic island -->
  <rect x="638" y="64" width="46" height="14" rx="7" fill="#c9a96e28" stroke="#c9a96e" stroke-width=".8"/>
  <!-- Home indicator -->
  <rect x="628" y="356" width="60" height="5" rx="2.5" fill="#c9a96e" opacity=".3"/>
  <!-- Screen content -->
  <rect x="568" y="86" width="190" height="262" rx="10" fill="#c9a96e0a" stroke="#c9a96e" stroke-width=".5"/>
  <rect x="568" y="86" width="190" height="26" rx="10" fill="#c9a96e1c" stroke="#c9a96e" stroke-width="0"/>
  <text x="663" y="103" text-anchor="middle" fill="#c9a96e" font-size="9.5" font-family="system-ui,sans-serif" font-weight="800">FitTrack</text>
  <!-- Class grid -->
  <rect x="578" y="122" width="82" height="64" rx="8" fill="#c9a96e18" stroke="#c9a96e" stroke-width=".9"/>
  <text x="619" y="146" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="system-ui,sans-serif" font-weight="700">Pilates</text>
  <text x="619" y="159" text-anchor="middle" fill="#c9a96e" font-size="7.5" font-family="monospace" opacity=".65">Tue 06:30</text>
  <text x="619" y="172" text-anchor="middle" fill="#c9a96e" font-size="7.5" font-family="monospace" opacity=".5">4 left</text>
  <rect x="668" y="122" width="82" height="64" rx="8" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.1"/>
  <text x="709" y="146" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="system-ui,sans-serif" font-weight="700">Spin</text>
  <text x="709" y="159" text-anchor="middle" fill="#c9a96e" font-size="7.5" font-family="monospace" opacity=".65">Tue 08:00</text>
  <text x="709" y="172" text-anchor="middle" fill="#c9a96e" font-size="7.5" font-family="monospace" opacity=".5">Full</text>
  <!-- Checkout / payment -->
  <rect x="578" y="198" width="172" height="60" rx="8" fill="#c9a96e18" stroke="#c9a96e" stroke-width=".9"/>
  <text x="664" y="220" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="system-ui,sans-serif" font-weight="700">One-time Booking</text>
  <text x="664" y="236" text-anchor="middle" fill="#c9a96e" font-size="8" font-family="monospace" opacity=".7">Nexio · $12.00</text>
  <rect x="598" y="244" width="132" height="8" rx="4" fill="#c9a96e" opacity=".2"/>
  <!-- Progress bar -->
  <rect x="578" y="270" width="172" height="60" rx="8" fill="#c9a96e12" stroke="#c9a96e" stroke-width=".8"/>
  <text x="664" y="290" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="monospace" opacity=".7">TestRail · JIRA</text>
  <text x="664" y="305" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="monospace" opacity=".7">Katalon · RainforestQA</text>
  <!-- Label -->
  <text x="663" y="390" text-anchor="middle" fill="#c9a96e" font-size="10.5" font-family="system-ui,sans-serif" font-weight="700" opacity=".8">iOS</text>
</svg>
