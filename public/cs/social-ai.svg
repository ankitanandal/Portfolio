<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Social AI: Prompt → AI Generator → Scheduled Queue → Platforms (LI, IG, TW) -->
  <!-- Accent: #8b6f5e -->

  <!-- INPUT PROMPT (left) -->
  <rect x="20" y="110" width="168" height="160" rx="13" fill="#8b6f5e14" stroke="#8b6f5e" stroke-width="1.3"/>
  <text x="104" y="136" text-anchor="middle" fill="#8b6f5e" font-size="10" font-family="system-ui,sans-serif" font-weight="700">Content Brief</text>
  <line x1="36" y1="145" x2="172" y2="145" stroke="#8b6f5e" stroke-width=".8" opacity=".3"/>
  <!-- Prompt lines (fake text) -->
  <line x1="36" y1="158" x2="172" y2="158" stroke="#8b6f5e" stroke-width="1" opacity=".4"/>
  <line x1="36" y1="172" x2="172" y2="172" stroke="#8b6f5e" stroke-width="1" opacity=".4"/>
  <line x1="36" y1="186" x2="148" y2="186" stroke="#8b6f5e" stroke-width="1" opacity=".4"/>
  <line x1="36" y1="206" x2="172" y2="206" stroke="#8b6f5e" stroke-width="1" opacity=".25"/>
  <line x1="36" y1="220" x2="172" y2="220" stroke="#8b6f5e" stroke-width="1" opacity=".25"/>
  <line x1="36" y1="234" x2="130" y2="234" stroke="#8b6f5e" stroke-width="1" opacity=".25"/>
  <!-- Tone / keywords tags -->
  <rect x="36" y="248" width="50" height="16" rx="5" fill="#8b6f5e20" stroke="#8b6f5e" stroke-width=".8"/>
  <text x="61" y="260" text-anchor="middle" fill="#8b6f5e" font-size="7.5" font-family="monospace" opacity=".8">tone: pro</text>
  <rect x="94" y="248" width="62" height="16" rx="5" fill="#8b6f5e20" stroke="#8b6f5e" stroke-width=".8"/>
  <text x="125" y="260" text-anchor="middle" fill="#8b6f5e" font-size="7.5" font-family="monospace" opacity=".8">platform: LI</text>

  <!-- Arrow → AI -->
  <line x1="190" y1="190" x2="244" y2="190" stroke="#8b6f5e" stroke-width="1.4" opacity=".55"/>
  <polygon points="250,190 242,186 242,194" fill="#8b6f5e" opacity=".65"/>

  <!-- AI GENERATOR (center) -->
  <rect x="250" y="90" width="200" height="200" rx="16" fill="#8b6f5e22" stroke="#8b6f5e" stroke-width="2"/>
  <text x="350" y="124" text-anchor="middle" fill="#8b6f5e" font-size="14" font-family="system-ui,sans-serif" font-weight="800">AI Generator</text>
  <text x="350" y="143" text-anchor="middle" fill="#8b6f5e" font-size="9" font-family="monospace" opacity=".6">NLP · GPT · guardrails</text>
  <!-- Concentric arc pattern suggesting AI processing -->
  <circle cx="350" cy="205" r="44" stroke="#8b6f5e" stroke-width="1" opacity=".15" fill="#8b6f5e08"/>
  <circle cx="350" cy="205" r="30" stroke="#8b6f5e" stroke-width="1" opacity=".22" fill="#8b6f5e0c"/>
  <circle cx="350" cy="205" r="16" stroke="#8b6f5e" stroke-width="1.5" opacity=".35" fill="#8b6f5e18"/>
  <circle cx="350" cy="205" r="5" fill="#8b6f5e" opacity=".5"/>
  <!-- Orbiting dots -->
  <circle cx="350" cy="161" r="4" fill="#8b6f5e" opacity=".3"/>
  <circle cx="394" cy="205" r="4" fill="#8b6f5e" opacity=".3"/>
  <circle cx="350" cy="249" r="4" fill="#8b6f5e" opacity=".3"/>
  <circle cx="306" cy="205" r="4" fill="#8b6f5e" opacity=".3"/>
  <text x="350" y="270" text-anchor="middle" fill="#8b6f5e" font-size="8.5" font-family="monospace" opacity=".5">NLP validation · quality gate</text>

  <!-- Arrow → Queue -->
  <line x1="450" y1="190" x2="496" y2="190" stroke="#8b6f5e" stroke-width="1.4" opacity=".55"/>
  <polygon points="502,190 494,186 494,194" fill="#8b6f5e" opacity=".65"/>

  <!-- SCHEDULED QUEUE (center-right) -->
  <rect x="502" y="110" width="156" height="160" rx="13" fill="#8b6f5e14" stroke="#8b6f5e" stroke-width="1.4"/>
  <text x="580" y="136" text-anchor="middle" fill="#8b6f5e" font-size="10" font-family="system-ui,sans-serif" font-weight="700">Schedule Queue</text>
  <line x1="518" y1="144" x2="642" y2="144" stroke="#8b6f5e" stroke-width=".8" opacity=".3"/>
  <!-- Post queue items -->
  <rect x="518" y="154" width="120" height="24" rx="6" fill="#8b6f5e20" stroke="#8b6f5e" stroke-width=".9"/>
  <text x="534" y="170" fill="#8b6f5e" font-size="8" font-family="monospace" opacity=".8">Mon 09:00 · LI</text>
  <rect x="518" y="184" width="120" height="24" rx="6" fill="#8b6f5e20" stroke="#8b6f5e" stroke-width=".9"/>
  <text x="534" y="200" fill="#8b6f5e" font-size="8" font-family="monospace" opacity=".8">Tue 12:00 · IG</text>
  <rect x="518" y="214" width="120" height="24" rx="6" fill="#8b6f5e20" stroke="#8b6f5e" stroke-width=".9"/>
  <text x="534" y="230" fill="#8b6f5e" font-size="8" font-family="monospace" opacity=".8">Wed 17:00 · TW</text>
  <rect x="518" y="244" width="120" height="16" rx="5" fill="#8b6f5e14" stroke="#8b6f5e" stroke-width=".7" opacity=".6"/>
  <text x="578" y="256" text-anchor="middle" fill="#8b6f5e" font-size="7.5" font-family="monospace" opacity=".5">+ 12 queued</text>

  <!-- Arrows from queue to platforms -->
  <line x1="660" y1="160" x2="698" y2="120" stroke="#8b6f5e" stroke-width="1.1" stroke-dasharray="5 3" opacity=".5"/>
  <polygon points="702,116 698,125 706,123" fill="#8b6f5e" opacity=".6"/>
  <line x1="660" y1="190" x2="698" y2="198" stroke="#8b6f5e" stroke-width="1.1" opacity=".5"/>
  <polygon points="704,198 697,193 697,203" fill="#8b6f5e" opacity=".6"/>
  <line x1="660" y1="222" x2="698" y2="278" stroke="#8b6f5e" stroke-width="1.1" stroke-dasharray="5 3" opacity=".5"/>
  <polygon points="700,284 698,275 706,276" fill="#8b6f5e" opacity=".6"/>

  <!-- PLATFORMS (right column) -->
  <!-- LinkedIn -->
  <rect x="704" y="90" width="86" height="56" rx="9" fill="#8b6f5e14" stroke="#8b6f5e" stroke-width="1.2"/>
  <text x="747" y="116" text-anchor="middle" fill="#8b6f5e" font-size="10" font-family="system-ui,sans-serif" font-weight="700">LinkedIn</text>
  <text x="747" y="132" text-anchor="middle" fill="#8b6f5e" font-size="8" font-family="monospace" opacity=".6">in</text>

  <!-- Instagram -->
  <rect x="704" y="165" width="86" height="56" rx="9" fill="#8b6f5e18" stroke="#8b6f5e" stroke-width="1.4"/>
  <text x="747" y="190" text-anchor="middle" fill="#8b6f5e" font-size="10" font-family="system-ui,sans-serif" font-weight="700">Instagram</text>
  <text x="747" y="207" text-anchor="middle" fill="#8b6f5e" font-size="8" font-family="monospace" opacity=".6">ig</text>

  <!-- Twitter/X -->
  <rect x="704" y="240" width="86" height="56" rx="9" fill="#8b6f5e14" stroke="#8b6f5e" stroke-width="1.2"/>
  <text x="747" y="265" text-anchor="middle" fill="#8b6f5e" font-size="10" font-family="system-ui,sans-serif" font-weight="700">Twitter</text>
  <text x="747" y="282" text-anchor="middle" fill="#8b6f5e" font-size="8" font-family="monospace" opacity=".6">tw</text>

  <!-- AWS infra note at bottom -->
  <text x="400" y="370" text-anchor="middle" fill="#8b6f5e" font-size="8.5" font-family="monospace" opacity=".4">AWS · EC2 · S3 · backend · database</text>
</svg>
