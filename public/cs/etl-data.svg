<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- ETL Pipeline: Source A/B/C → Transform → Validate → Data Warehouse -->
  <!-- Accent: #c9a96e -->

  <!-- SOURCE LABEL -->
  <text x="100" y="44" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="monospace" font-weight="700" opacity=".6" letter-spacing="1.5">SOURCES</text>

  <!-- Source A — CSV / Files -->
  <rect x="34" y="58" width="132" height="58" rx="9" fill="#c9a96e14" stroke="#c9a96e" stroke-width="1.2"/>
  <text x="56" y="84" fill="#c9a96e" font-size="9.5" font-family="monospace" font-weight="700" opacity=".8">CSV</text>
  <line x1="34" y1="96" x2="166" y2="96" stroke="#c9a96e" stroke-width=".8" opacity=".25"/>
  <text x="56" y="108" fill="#c9a96e" font-size="8.5" font-family="system-ui,sans-serif" opacity=".65">Flat files · Exports</text>

  <!-- Source B — Relational DB -->
  <rect x="34" y="132" width="132" height="58" rx="9" fill="#c9a96e14" stroke="#c9a96e" stroke-width="1.2"/>
  <text x="56" y="158" fill="#c9a96e" font-size="9.5" font-family="monospace" font-weight="700" opacity=".8">SQL DB</text>
  <line x1="34" y1="170" x2="166" y2="170" stroke="#c9a96e" stroke-width=".8" opacity=".25"/>
  <text x="56" y="182" fill="#c9a96e" font-size="8.5" font-family="system-ui,sans-serif" opacity=".65">PostgreSQL · MySQL</text>

  <!-- Source C — API -->
  <rect x="34" y="206" width="132" height="58" rx="9" fill="#c9a96e14" stroke="#c9a96e" stroke-width="1.2"/>
  <text x="56" y="232" fill="#c9a96e" font-size="9.5" font-family="monospace" font-weight="700" opacity=".8">API</text>
  <line x1="34" y1="244" x2="166" y2="244" stroke="#c9a96e" stroke-width=".8" opacity=".25"/>
  <text x="56" y="256" fill="#c9a96e" font-size="8.5" font-family="system-ui,sans-serif" opacity=".65">REST · Webhooks</text>

  <!-- Converging arrows → Transform -->
  <line x1="168" y1="87" x2="244" y2="165" stroke="#c9a96e" stroke-width="1.2" opacity=".5"/>
  <line x1="168" y1="161" x2="244" y2="184" stroke="#c9a96e" stroke-width="1.2" opacity=".5"/>
  <line x1="168" y1="235" x2="244" y2="202" stroke="#c9a96e" stroke-width="1.2" opacity=".5"/>
  <polygon points="250,192 241,183 249,180" fill="#c9a96e" opacity=".6"/>

  <!-- TRANSFORM BOX (center) -->
  <text x="360" y="44" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="monospace" font-weight="700" opacity=".6" letter-spacing="1.5">TRANSFORM</text>
  <rect x="250" y="114" width="220" height="152" rx="14" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.8"/>
  <text x="360" y="147" text-anchor="middle" fill="#c9a96e" font-size="13" font-family="system-ui,sans-serif" font-weight="800">Airbyte ETL</text>
  <!-- Transform steps inside -->
  <rect x="268" y="160" width="184" height="26" rx="6" fill="#c9a96e18" stroke="#c9a96e" stroke-width=".8"/>
  <text x="360" y="177" text-anchor="middle" fill="#c9a96e" font-size="9.5" font-family="monospace" opacity=".8">normalize · deduplicate</text>
  <rect x="268" y="193" width="184" height="26" rx="6" fill="#c9a96e18" stroke="#c9a96e" stroke-width=".8"/>
  <text x="360" y="210" text-anchor="middle" fill="#c9a96e" font-size="9.5" font-family="monospace" opacity=".8">type-cast · join · filter</text>
  <rect x="268" y="226" width="184" height="26" rx="6" fill="#c9a96e18" stroke="#c9a96e" stroke-width=".8"/>
  <text x="360" y="243" text-anchor="middle" fill="#c9a96e" font-size="9.5" font-family="monospace" opacity=".8">schema validation</text>

  <!-- Validation dots under transform -->
  <line x1="360" y1="268" x2="360" y2="296" stroke="#c9a96e" stroke-width="1" opacity=".35" stroke-dasharray="4 3"/>
  <circle cx="360" cy="304" r="8" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.2"/>
  <text x="360" y="308" text-anchor="middle" fill="#c9a96e" font-size="10">&#10003;</text>
  <text x="360" y="326" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="system-ui,sans-serif" opacity=".6">QA validated</text>

  <!-- Arrow Transform → Store -->
  <line x1="472" y1="190" x2="530" y2="190" stroke="#c9a96e" stroke-width="1.5" opacity=".55"/>
  <polygon points="536,190 528,186 528,194" fill="#c9a96e" opacity=".65"/>

  <!-- DATA WAREHOUSE (right) -->
  <text x="644" y="44" text-anchor="middle" fill="#c9a96e" font-size="9" font-family="monospace" font-weight="700" opacity=".6" letter-spacing="1.5">TARGET</text>
  <!-- Cylinder -->
  <ellipse cx="644" cy="130" rx="66" ry="18" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.5"/>
  <rect x="578" y="130" width="132" height="110" fill="#c9a96e14" stroke="#c9a96e" stroke-width="1.5"/>
  <ellipse cx="644" cy="240" rx="66" ry="18" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Horizontal lines suggesting data rows -->
  <line x1="588" y1="161" x2="700" y2="161" stroke="#c9a96e" stroke-width=".8" opacity=".3"/>
  <line x1="588" y1="180" x2="700" y2="180" stroke="#c9a96e" stroke-width=".8" opacity=".3"/>
  <line x1="588" y1="199" x2="700" y2="199" stroke="#c9a96e" stroke-width=".8" opacity=".3"/>
  <line x1="588" y1="218" x2="700" y2="218" stroke="#c9a96e" stroke-width=".8" opacity=".3"/>
  <text x="644" y="175" text-anchor="middle" fill="#c9a96e" font-size="12" font-family="system-ui,sans-serif" font-weight="700">Data</text>
  <text x="644" y="193" text-anchor="middle" fill="#c9a96e" font-size="12" font-family="system-ui,sans-serif" font-weight="700">Warehouse</text>
  <text x="644" y="260" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="monospace" opacity=".55">MongoDB · Neo4j · OpenSearch</text>

  <!-- Validation dot under warehouse -->
  <line x1="644" y1="280" x2="644" y2="304" stroke="#c9a96e" stroke-width="1" opacity=".35" stroke-dasharray="4 3"/>
  <circle cx="644" cy="312" r="8" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.2"/>
  <text x="644" y="316" text-anchor="middle" fill="#c9a96e" font-size="10">&#10003;</text>
  <text x="644" y="334" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="system-ui,sans-serif" opacity=".6">source-to-target</text>

  <!-- Source dots too -->
  <circle cx="100" cy="304" r="8" fill="#c9a96e20" stroke="#c9a96e" stroke-width="1.2"/>
  <text x="100" y="308" text-anchor="middle" fill="#c9a96e" font-size="10">&#10003;</text>
  <text x="100" y="326" text-anchor="middle" fill="#c9a96e" font-size="8.5" font-family="system-ui,sans-serif" opacity=".6">ingestion</text>
</svg>
